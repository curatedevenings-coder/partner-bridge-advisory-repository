<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to PartnerBridge Intake</title>
    <meta
      name="description"
      content="Redirecting to the PartnerBridge Advisory intake form."
    />
    <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSei7xh_zczdnQHIX7bsKBW0FZ-hHxvt63DixDa_KeVq4-_bRw/viewform?usp=publish-editor" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #1f2933;
        background:
          radial-gradient(circle at top left, rgba(107, 118, 102, 0.05), transparent 26%),
          radial-gradient(circle at bottom right, rgba(107, 118, 102, 0.04), transparent 30%),
          #ffffff;
      }

      main {
        max-width: 34rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.25rem, 6vw, 3.75rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
        color: #4a545d;
      }

      a {
        display: inline-flex;
        margin-top: 2rem;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #1f2933;
        padding: 0.9rem 1.4rem;
        color: #ffffff;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening the intake page.</h1>
      <p>
        If you are not redirected automatically, use the button below to open the
        PartnerBridge Advisory intake form.
      </p>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSei7xh_zczdnQHIX7bsKBW0FZ-hHxvt63DixDa_KeVq4-_bRw/viewform?usp=publish-editor">Open intake form</a>
    </main>
  </body>
</html>
